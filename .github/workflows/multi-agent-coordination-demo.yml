name: Multi-Agent Coordination Demo Autopilot

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Demo scenario'
        type: choice
        default: enterprise-ai-acceptance
        options:
          - enterprise-ai-acceptance
          - research-dossier-review
          - vendor-proof-mission
      agent_scale:
        description: 'Synthetic agent constellation size'
        type: choice
        default: '24'
        options:
          - '12'
          - '24'
          - '48'

permissions:
  contents: read

jobs:
  generate:
    name: Generate browser-local multi-agent demo artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Build and verify browser demo
        env:
          GOALOS_SCENARIO: ${{ inputs.scenario }}
          GOALOS_AGENT_SCALE: ${{ inputs.agent_scale }}
        run: |
          set -euo pipefail
          rm -rf site artifacts
          node scripts/build-multi-agent-coordination-demo.mjs
          node scripts/verify-multi-agent-coordination-demo.mjs
          node scripts/generate-multi-agent-coordination-demo-bundle.mjs "$GOALOS_SCENARIO" "$GOALOS_AGENT_SCALE"
      - name: Upload demo artifact bundle
        uses: actions/upload-artifact@v7
        with:
          name: goalos-multi-agent-sovereign-institution-demo-${{ inputs.scenario }}-${{ inputs.agent_scale }}
          path: artifacts/multi-agent-sovereign-institution-demo
          retention-days: 30
