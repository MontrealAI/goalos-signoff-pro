name: Multi-Agent Coordination Demo Autopilot

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Public-safe demo scenario"
        required: true
        default: "research"
        type: choice
        options:
          - research
          - automation
          - grant
          - defensive

permissions:
  contents: read

jobs:
  generate:
    name: Generate browser-safe multi-agent demo artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ""
      - name: Generate demo bundle
        run: |
          set -euo pipefail
          node scripts/generate-multi-agent-coordination-demo-bundle.mjs
      - name: Build and verify site demo
        run: |
          set -euo pipefail
          rm -rf site
          mkdir -p site
          if [ -f scripts/build-asi-apex-v6-pages.mjs ]; then node scripts/build-asi-apex-v6-pages.mjs; fi
          node scripts/build-multi-agent-coordination-demo.mjs
          node scripts/verify-multi-agent-coordination-demo.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: goalos-multi-agent-coordination-demo-${{ github.event.inputs.scenario }}
          path: artifacts/multi-agent-coordination-demo
