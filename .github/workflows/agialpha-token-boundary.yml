name: AGIALPHA external token boundary gate

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'config/agialpha-token-boundary.json'
      - 'scripts/build-agialpha-token-boundary-pages.mjs'
      - 'scripts/verify-agialpha-token-boundary.mjs'
      - 'scripts/verify-public-artifact-safety.mjs'
      - '.github/workflows/agialpha-token-boundary.yml'

permissions:
  contents: read

jobs:
  verify-agialpha-boundary:
    name: Verify AGIALPHA external token posture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Build current public site layers if available
        run: |
          set -euo pipefail
          rm -rf site
          if [ -f scripts/build-asi-apex-v6-pages.mjs ]; then node scripts/build-asi-apex-v6-pages.mjs; else mkdir -p site && printf '<!doctype html><title>GoalOS Signoff Pro</title><h1>GoalOS Signoff Pro</h1>' > site/index.html; fi
          if [ -f scripts/build-sovereign-machine-economy-pages.mjs ]; then node scripts/build-sovereign-machine-economy-pages.mjs; fi
          if [ -f scripts/build-user-activation-pages.mjs ]; then node scripts/build-user-activation-pages.mjs; fi
          if [ -f scripts/build-legal-zero-data-pages.mjs ]; then node scripts/build-legal-zero-data-pages.mjs; fi
          node scripts/build-agialpha-token-boundary-pages.mjs
      - name: Verify AGIALPHA token boundary
        run: node scripts/verify-agialpha-token-boundary.mjs
      - name: Verify final public artifact safety
        run: |
          if [ -f scripts/verify-public-artifact-safety.mjs ]; then node scripts/verify-public-artifact-safety.mjs; fi
      - name: Upload site preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agialpha-token-boundary-site-preview
          path: site
          if-no-files-found: ignore
