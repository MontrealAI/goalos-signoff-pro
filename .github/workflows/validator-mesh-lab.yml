name: Validator Mesh Falsification Lab Autopilot

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Public-safe synthetic scenario
        type: choice
        required: true
        default: research-brief
        options:
          - research-brief
          - software-delivery
          - procurement-dossier
          - safety-escalation

permissions:
  contents: read

jobs:
  generate:
    name: Generate public-safe validator mesh demo bundle
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Generate demo bundle
        shell: bash
        run: |
          set -euo pipefail
          node scripts/generate-validator-mesh-lab-bundle.mjs "${{ inputs.scenario }}"
      - name: Upload demo bundle
        uses: actions/upload-artifact@v7
        with:
          name: goalos-validator-mesh-falsification-demo
          path: artifacts/validator-mesh-lab
