name: Sovereign Experience Stream Lab Autopilot

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Public-safe synthetic scenario
        type: choice
        options:
          - research
          - software
          - defensive
          - policy
        default: research

permissions:
  contents: read

jobs:
  generate:
    name: Generate public-safe sovereign experience bundle
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Generate bundle
        env:
          SCENARIO: ${{ inputs.scenario }}
        run: node scripts/generate-sovereign-experience-lab-bundle.mjs
      - name: Upload generated bundle
        uses: actions/upload-artifact@v4
        with:
          name: goalos-sovereign-experience-stream-lab
          path: artifacts/sovereign-experience-stream-lab
