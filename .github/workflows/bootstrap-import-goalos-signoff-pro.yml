name: Bootstrap import GoalOS Signoff Pro package

on:
  push:
    paths:
      - 'GoalOS-Signoff-Pro-v1.1-MontrealAI-GitHub-Repository-v1.0.2.zip'
      - '.github/workflows/bootstrap-import-goalos-signoff-pro.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-package:
    name: Import repository package from ZIP
    runs-on: ubuntu-latest
    steps:
      - name: Clone this repository
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo

      - name: Import package and commit source files, excluding workflow files
        shell: bash
        run: |
          set -euo pipefail
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          ZIP="GoalOS-Signoff-Pro-v1.1-MontrealAI-GitHub-Repository-v1.0.2.zip"
          if [ ! -f "$ZIP" ]; then
            echo "Missing $ZIP at repository root. Upload the package ZIP first."
            exit 1
          fi

          echo "Package checksum in repository:"
          sha256sum "$ZIP"

          rm -rf __goalos_import __goalos_package
          mkdir -p __goalos_import __goalos_package
          unzip -q "$ZIP" -d __goalos_import

          python3 - <<'PY'
          import pathlib, shutil, sys
          extracted = pathlib.Path('__goalos_import').resolve()
          candidates = [p for p in extracted.rglob('package.json') if p.is_file()]
          if not candidates:
              raise SystemExit('Could not find package.json inside ZIP.')
          roots = sorted({p.parent for p in candidates}, key=lambda p: len(p.parts))
          source = roots[0]
          target = pathlib.Path('__goalos_package').resolve()
          if target.exists():
              shutil.rmtree(target)
          shutil.copytree(source, target)
          workflows = target / '.github' / 'workflows'
          if workflows.exists():
              shutil.rmtree(workflows)
          # The GitHub App token cannot create/update workflow files. These must be added manually by a human later.
          PY

          rsync -a --exclude='.git/' --exclude='__goalos_import/' --exclude='__goalos_package/' --exclude="$ZIP" __goalos_package/ ./
          rm -rf __goalos_import __goalos_package "$ZIP"

          cat > NEXT_STEP_WORKFLOWS.md <<'EOF'
          # Next step: add workflows manually

          The repository package was imported successfully, excluding `.github/workflows/**`.

          GitHub blocks GitHub Actions' own bot token from creating or updating workflow files unless that token has the special `workflows` permission. This is why the earlier import failed.

          Add CI workflows manually through the GitHub web UI or GitHub Desktop after this import commit succeeds.
          EOF

          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "Initial GoalOS Signoff Pro repository source import"
          git push origin HEAD:main
