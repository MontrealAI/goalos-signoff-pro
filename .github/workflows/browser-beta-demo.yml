name: Browser Beta Demo Autopilot

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-demo:
    name: Generate browser beta demo bundle
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Generate demo artifact bundle
        run: node scripts/generate-browser-beta-demo-bundle.mjs
      - name: Upload demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: goalos-browser-beta-demo-bundle
          path: artifacts/proof-gated-coordination-demo
