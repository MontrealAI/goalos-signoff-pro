name: Browser Beta Demo Autopilot

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Demo scenario"
        type: choice
        required: true
        default: "AI research report"
        options:
          - "AI research report"
          - "Automation delivery"
          - "Grant milestone"
          - "Procurement review"

permissions:
  contents: read

jobs:
  demo:
    name: Generate browser beta demo bundle
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Generate demo bundle
        run: node scripts/generate-browser-beta-demo-bundle.mjs
      - name: Upload demo bundle
        uses: actions/upload-artifact@v7
        with:
          name: goalos-browser-beta-demo-bundle
          path: artifacts/browser-beta-demo
