name: GoalOS Signoff Pro — Loop to RSI to ASI Control Tower v34

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Public-safe v34 scenario label"
        required: false
        default: "asi-threshold-review"
      commit_generated_site:
        description: "Commit generated site artifacts back to the branch"
        type: boolean
        required: false
        default: true
      deploy_pages:
        description: "Deploy GitHub Pages after build"
        type: boolean
        required: false
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GOALOS_PUBLIC_SAFE: "true"
  GOALOS_ZERO_VALUE_MOVED: "true"
  GOALOS_NO_EXTERNAL_AI_CALLS: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-v34:
    name: Build v34 Control Tower
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Build GoalOS public labs through v34
        run: node scripts/build-goalos-signoff-public-labs-v22-v34.mjs
      - name: Verify v34 Control Tower
        run: node scripts/verify-loop-rsi-asi-superintelligence-control-tower-v34.mjs
      - name: Commit generated site artifacts
        if: ${{ inputs.commit_generated_site }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site config docs scripts verification .github/workflows GOALOS_PUBLIC_LAB_V34_LOOP_RSI_ASI_START_HERE.md GITHUB_WEB_UI_INSTALL_V34_LOOP_RSI_ASI.txt GOALOS_V33_V34_ACTIONS_ERROR_CORRECTION_START_HERE.md || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Loop to RSI to ASI Control Tower Lab v34"
            git push
          fi
      - name: Upload v34 preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: goalos-signoff-pro-v34-site-preview
          path: site
      - name: Upload Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    if: ${{ inputs.deploy_pages }}
    needs: build-v34
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
