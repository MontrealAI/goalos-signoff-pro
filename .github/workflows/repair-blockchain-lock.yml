name: Repair blockchain npm lockfile

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    name: Normalize blockchain/package-lock.json without installing optional native packages
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Normalize blockchain lockfile safely
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const path = 'blockchain/package-lock.json';
          if (!fs.existsSync(path)) {
            console.error('Missing blockchain/package-lock.json');
            process.exit(1);
          }

          const lock = JSON.parse(fs.readFileSync(path, 'utf8'));
          const internalPrefixes = [
            'https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/',
            'https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public'
          ];

          let changed = 0;
          function normalizeValue(value) {
            if (typeof value !== 'string') return value;
            for (const prefix of internalPrefixes) {
              if (value.startsWith(prefix + '/')) {
                changed += 1;
                return 'https://registry.npmjs.org/' + value.slice((prefix + '/').length);
              }
              if (value.startsWith(prefix)) {
                changed += 1;
                return 'https://registry.npmjs.org/' + value.slice(prefix.length).replace(/^\//, '');
              }
            }
            return value;
          }

          function walk(node) {
            if (!node || typeof node !== 'object') return;
            if (Array.isArray(node)) {
              for (const item of node) walk(item);
              return;
            }
            for (const [key, value] of Object.entries(node)) {
              if (key === 'resolved') node[key] = normalizeValue(value);
              else walk(value);
            }
          }
          walk(lock);

          // The imported lockfile can contain an extraneous Linux-hostile fsevents entry under ganache.
          // fsevents is a macOS-only optional dependency of chokidar. It is not required for Linux CI,
          // and leaving it as an extraneous package can make repair workflows fail with EBADPLATFORM.
          if (lock.packages && lock.packages['node_modules/ganache/node_modules/fsevents']) {
            delete lock.packages['node_modules/ganache/node_modules/fsevents'];
            changed += 1;
          }
          if (lock.dependencies && lock.dependencies.fsevents) {
            delete lock.dependencies.fsevents;
            changed += 1;
          }

          fs.writeFileSync(path, JSON.stringify(lock, null, 2) + '\n');
          console.log(`Normalized blockchain/package-lock.json changes: ${changed}`);
          NODE

      - name: Refuse private/internal registry references
        shell: bash
        run: |
          set -euo pipefail
          if grep -R -n -E "applied-caas|internal\.api\.openai\.org|artifactory|npm-public" blockchain/package-lock.json blockchain/package.json 2>/dev/null; then
            echo "::error::Private/internal registry reference remains in blockchain package files."
            exit 1
          fi
          if grep -R -n "node_modules/ganache/node_modules/fsevents" blockchain/package-lock.json 2>/dev/null; then
            echo "::error::Extraneous fsevents lockfile entry remains."
            exit 1
          fi

      - name: Commit normalized blockchain lockfile
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- blockchain/package-lock.json; then
            echo "blockchain/package-lock.json already normalized."
            exit 0
          fi
          git add blockchain/package-lock.json
          git commit -m "Normalize optional blockchain lockfile"
          git push
