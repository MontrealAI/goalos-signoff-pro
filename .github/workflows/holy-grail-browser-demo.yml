name: Holy Grail Browser Demo Autopilot

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Public-safe demo scenario"
        required: true
        type: choice
        options:
          - ai-research
          - automation
          - vendor
          - grant
        default: ai-research

permissions:
  contents: read

jobs:
  demo:
    name: Generate browser-local Proof Run 001 artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Build and verify demo pages
        run: |
          set -euo pipefail
          rm -rf site artifacts/holy-grail-proof-run-001
          mkdir -p site
          node scripts/build-holy-grail-browser-demo.mjs
          node scripts/verify-holy-grail-browser-demo.mjs
      - name: Generate downloadable Proof Run 001 bundle
        run: node scripts/generate-holy-grail-demo-bundle.mjs
      - uses: actions/upload-artifact@v7
        with:
          name: goalos-holy-grail-proof-run-001-${{ inputs.scenario }}
          path: artifacts/holy-grail-proof-run-001
