name: Generate demo Proof Mission

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-demo:
    name: Generate public-safe demo proof mission
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate demo Proof Mission artifacts
        run: node scripts/generate-demo-proof-mission.mjs
      - name: Upload demo Proof Mission
        uses: actions/upload-artifact@v4
        with:
          name: demo-proof-mission
          path: artifacts/demo-proof-mission
          if-no-files-found: error
