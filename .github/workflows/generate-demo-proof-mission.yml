name: Generate demo Proof Mission

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  demo:
    name: Generate public-safe demo proof mission artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: node scripts/generate-demo-proof-mission.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: goalos-demo-proof-mission
          path: artifacts/demo-proof-mission
