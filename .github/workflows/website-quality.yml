name: Website quality gate

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'config/**'
      - 'docs/**'
      - 'public/**'
      - '.github/workflows/website-quality.yml'

permissions:
  contents: read

jobs:
  verify:
    name: Verify generated public site quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build site preview
        shell: bash
        run: |
          set -euo pipefail
          rm -rf site
          if [ -f scripts/build-goalos-production-site.mjs ]; then
            node scripts/build-goalos-production-site.mjs
          else
            mkdir -p site
          fi
          if [ -d scripts ]; then
            while IFS= read -r script; do
              node "$script"
            done < <(find scripts -maxdepth 1 -type f -name 'build-*-lab-page.mjs' | sort)
          fi
          if [ -f scripts/finalize-public-site-boundaries.mjs ]; then
            node scripts/finalize-public-site-boundaries.mjs
          fi
          if [ -d scripts ]; then
            while IFS= read -r script; do
              node "$script"
            done < <(find scripts -maxdepth 1 -type f \( -name 'repair-*-legal-rails.mjs' -o -name 'repair-*-public-rule.mjs' \) | sort)
          fi
          if [ -f scripts/normalize-public-site-boundaries.mjs ]; then
            node scripts/normalize-public-site-boundaries.mjs
          fi
          # Final targeted repair after global normalization. This prevents older
          # normalizers/finalizers from erasing verifier-compatible legal phrases.
          if [ -f scripts/repair-governed-decision-state-public-rule.mjs ]; then
            node scripts/repair-governed-decision-state-public-rule.mjs
          fi
          if [ -f scripts/repair-validator-mesh-legal-rails.mjs ]; then
            node scripts/repair-validator-mesh-legal-rails.mjs
          fi
          if [ -f scripts/verify-public-site-boundary-phrases.mjs ]; then
            node scripts/verify-public-site-boundary-phrases.mjs
          fi
      - name: Run quality gates
        shell: bash
        run: |
          set -euo pipefail
          if [ -f scripts/verify-goalos-production-site.mjs ]; then
            node scripts/verify-goalos-production-site.mjs
          fi
          if [ -d scripts ]; then
            while IFS= read -r script; do
              node "$script"
            done < <(find scripts -maxdepth 1 -type f -name 'verify-*-lab-page.mjs' | sort)
          fi
          if [ -f scripts/verify-public-site-boundary-phrases.mjs ]; then
            node scripts/verify-public-site-boundary-phrases.mjs
          fi
          if [ -f scripts/verify-public-demo-routes.mjs ]; then
            node scripts/verify-public-demo-routes.mjs
          fi
          if [ -f scripts/verify-website-quality.mjs ]; then
            node scripts/verify-website-quality.mjs
          fi
      - name: Upload site preview
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: goalos-site-preview
          path: site
