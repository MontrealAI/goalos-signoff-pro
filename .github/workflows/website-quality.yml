name: Website quality gate

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    paths:
      - 'config/**'
      - 'scripts/**'
      - '.github/workflows/website-quality.yml'
      - '.github/workflows/pages.yml'
      - '.github/workflows/capability-compounding-lab.yml'

permissions:
  contents: read

jobs:
  quality:
    name: Verify generated public site quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Build site preview
        shell: bash
        run: |
          set -euo pipefail
          node scripts/build-goalos-production-site.mjs
          for script in \
            scripts/build-proof-gradient-lab-page.mjs \
            scripts/build-capability-compounding-lab-page.mjs; do
            if [ -f "$script" ]; then node "$script"; fi
          done
      - name: Run quality gates
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify-goalos-production-site.mjs
          if [ -f scripts/verify-proof-gradient-lab-page.mjs ]; then node scripts/verify-proof-gradient-lab-page.mjs; fi
          node scripts/verify-capability-compounding-lab-page.mjs
          node scripts/verify-public-demo-routes.mjs
      - name: Upload site preview
        uses: actions/upload-artifact@v7
        with:
          name: goalos-site-preview-with-capability-compounding-lab
          path: site
