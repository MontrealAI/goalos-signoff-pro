name: Website quality gate

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'config/**'
      - 'scripts/**'
      - '.github/workflows/website-quality.yml'

permissions:
  contents: read

jobs:
  verify:
    name: Verify generated public site quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build site preview
        shell: bash
        run: |
          set -euo pipefail
          if [ -f scripts/build-goalos-production-site.mjs ]; then node scripts/build-goalos-production-site.mjs; fi
          if [ -f scripts/build-proof-gradient-lab-page.mjs ]; then node scripts/build-proof-gradient-lab-page.mjs; fi
          if [ -f scripts/build-capability-compounding-lab-page.mjs ]; then node scripts/build-capability-compounding-lab-page.mjs; fi
          node scripts/build-sovereign-experience-lab-page.mjs
      - name: Run quality gates
        shell: bash
        run: |
          set -euo pipefail
          if [ -f scripts/verify-goalos-production-site.mjs ]; then node scripts/verify-goalos-production-site.mjs; fi
          if [ -f scripts/verify-proof-gradient-lab-page.mjs ]; then node scripts/verify-proof-gradient-lab-page.mjs; fi
          if [ -f scripts/verify-capability-compounding-lab-page.mjs ]; then node scripts/verify-capability-compounding-lab-page.mjs; fi
          node scripts/verify-sovereign-experience-lab-page.mjs
          if [ -f scripts/verify-public-demo-routes.mjs ]; then node scripts/verify-public-demo-routes.mjs; fi
          if [ -f scripts/verify-website-quality.mjs ]; then node scripts/verify-website-quality.mjs; fi
      - name: Upload site preview
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: goalos-site-preview
          path: site
          if-no-files-found: ignore
