name: GoalOS Signoff Pro Website Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build site for quality gate
        run: |
          set -euo pipefail
          node scripts/build-goalos-signoff-pro-institutional-v22-v29.mjs
      - name: Run quality gates
        run: |
          set -euo pipefail
          if [ -f scripts/verify-goalos-production-site.mjs ]; then node scripts/verify-goalos-production-site.mjs; fi
          node scripts/verify-goalos-signoff-public-labs-v22-v29.mjs
          node scripts/verify-signoff-pro-institutional-v28-v29.mjs
          if [ -f scripts/verify-blockchain-credibility-lab-page.mjs ]; then node scripts/verify-blockchain-credibility-lab-page.mjs; fi
          if [ -f scripts/verify-blockchain-proof-mandate-lab-page.mjs ]; then node scripts/verify-blockchain-proof-mandate-lab-page.mjs; fi
          if [ -f scripts/verify-public-artifact-safety.mjs ]; then node scripts/verify-public-artifact-safety.mjs; fi
