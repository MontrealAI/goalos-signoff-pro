name: Website quality gate

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]
    paths:
      - 'config/goalos-production-site.json'
      - 'config/proof-gated-coordination-demo.json'
      - 'scripts/build-goalos-production-site.mjs'
      - 'scripts/verify-goalos-production-site.mjs'
      - 'scripts/verify-website-quality.mjs'
      - '.github/workflows/website-quality.yml'

permissions:
  contents: read

jobs:
  quality:
    name: Verify generated public site quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build site preview
        run: node scripts/build-goalos-production-site.mjs
      - name: Run quality gate
        run: node scripts/verify-website-quality.mjs
      - name: Upload site preview
        uses: actions/upload-artifact@v4
        with:
          name: goalos-production-site-preview
          path: site
