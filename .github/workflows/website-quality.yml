name: Website quality gate

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'config/**'
      - '.github/workflows/website-quality.yml'
      - '.github/workflows/pages.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'config/**'
      - '.github/workflows/website-quality.yml'
      - '.github/workflows/pages.yml'

permissions:
  contents: read

jobs:
  website-quality:
    name: Build and verify user-facing website
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build public site
        run: |
          node scripts/build-asi-apex-v6-pages.mjs
          node scripts/build-sovereign-machine-economy-pages.mjs
          node scripts/build-user-activation-pages.mjs
      - name: Verify website quality
        run: node scripts/verify-website-quality.mjs
      - name: Upload generated site preview
        uses: actions/upload-artifact@v4
        with:
          name: goalos-site-preview
          path: site
          if-no-files-found: error
