name: Proof-to-Settlement Control Lab Autopilot

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Synthetic public-safe scenario
        required: true
        default: settlement-ready
        type: choice
        options:
          - output-only
          - proof-with-gap
          - settlement-ready
          - human-gated

permissions:
  contents: read

jobs:
  generate:
    name: Generate proof-to-settlement demo bundle
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Generate artifact bundle
        shell: bash
        run: |
          set -euo pipefail
          node scripts/generate-proof-settlement-lab-bundle.mjs
      - name: Upload proof-to-settlement bundle
        uses: actions/upload-artifact@v4
        with:
          name: goalos-proof-settlement-lab-${{ inputs.scenario }}
          path: artifacts/proof-settlement-lab
