name: Legal zero-data posture gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  legal:
    name: Build and verify legal zero-data posture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/build-asi-apex-v6-pages.mjs
      - run: node scripts/build-sovereign-machine-economy-pages.mjs
      - run: node scripts/build-user-activation-pages.mjs
      - run: node scripts/build-legal-zero-data-pages.mjs
      - run: node scripts/verify-legal-zero-data-posture.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: goalos-zero-data-legal-site-preview
          path: site
