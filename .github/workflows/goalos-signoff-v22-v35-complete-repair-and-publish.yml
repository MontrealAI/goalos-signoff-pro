name: GoalOS Signoff Pro — Complete v22-v35 Repair and Publish

on:
  workflow_dispatch:
    inputs:
      commit_generated_site:
        description: "Commit generated site files back to this branch"
        type: boolean
        required: false
        default: true
      deploy_pages:
        description: "Deploy GitHub Pages after successful verification"
        type: boolean
        required: false
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GOALOS_PUBLIC_SAFE: "true"
  GOALOS_ZERO_VALUE_MOVED: "true"
  GOALOS_NO_EXTERNAL_AI_CALLS: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "20.20.2"

concurrency:
  group: goalos-signoff-pro-v22-v35-complete-repair-and-publish
  cancel-in-progress: false

jobs:
  build:
    name: Build, repair, verify, and publish v22-v35
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - name: Preflight package completeness
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "scripts/build-goalos-signoff-public-labs-v22-v35.mjs"
            "scripts/verify-goalos-signoff-public-labs-v22-v35.mjs"
            "scripts/enhance-goalos-v30-v34-premium-experience.mjs"
            "scripts/enhance-goalos-v22-v35-institutional-command-center.mjs"
            "scripts/build-loop-rsi-asi-superintelligence-mission-simulator-v35.mjs"
            "scripts/verify-loop-rsi-asi-superintelligence-mission-simulator-v35.mjs"
            "scripts/enhance-goalos-v22-v35-ultimate-public-experience.mjs"
            "scripts/repair-goalos-v22-v35-html-integrity.mjs"
            "scripts/verify-goalos-v22-v35-ultimate-public-experience.mjs"
            "docs/generated-source/v35/site/loop-rsi-asi-superintelligence-mission-simulator-lab.html"
            "docs/generated-source/v33/site/loop-rsi-asi-superintelligence-lab.html"
          )
          missing=0
          for f in "${required[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::error::Missing required v35 repair file: $f"
              missing=1
            else
              echo "OK $f"
            fi
          done
          if [[ "$missing" == "1" ]]; then
            echo "Upload the complete one-go package contents to the repository root, including scripts/ and docs/generated-source/."
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi
      - name: Verify workflow/script integrity
        run: node scripts/check-workflow-script-integrity.mjs
      - name: Build complete v22-v35 public site
        run: node scripts/build-goalos-signoff-public-labs-v22-v35.mjs
      - name: Apply ultimate public experience layer
        run: node scripts/enhance-goalos-v22-v35-ultimate-public-experience.mjs
      - name: Repair legal rail and footer integrity
        run: node scripts/repair-goalos-v22-v35-html-integrity.mjs
      - name: Verify production site integrity
        run: node scripts/verify-goalos-production-site.mjs
      - name: Verify route and public-safe integrity
        run: node scripts/check-site-route-integrity.mjs
      - name: Verify ultimate v22-v35 public experience
        run: node scripts/verify-goalos-v22-v35-ultimate-public-experience.mjs
      - name: Verify complete v22-v35 public-safe suite
        run: node scripts/verify-goalos-signoff-public-labs-v22-v35.mjs
      - name: Commit generated site files
        if: ${{ inputs.commit_generated_site }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site config docs scripts verification .github/workflows GOALOS_* GITHUB_WEB_UI_INSTALL_* PACKAGE_MANIFEST.json PACKAGE_MANIFEST.sha256 || true
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Repair and publish GoalOS Signoff Pro v22-v35 complete experience"
            git push
          fi
      - name: Upload v22-v35 site preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: goalos-signoff-pro-v22-v35-complete-site-preview
          path: site
      - name: Upload Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    name: Deploy GitHub Pages
    if: ${{ inputs.deploy_pages }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
