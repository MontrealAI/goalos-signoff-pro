name: Deploy ASI Apex v5 production site

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build-asi-apex-v5-pages.mjs'
      - '.github/workflows/pages.yml'
      - 'README.md'
      - 'docs/**'
      - 'verification/**'
  workflow_dispatch:

concurrency:
  group: github-pages-asi-apex-v5
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build, verify, and package ASI Apex v5 site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Build ASI Apex v5 static site
        shell: bash
        run: |
          set -euo pipefail
          node scripts/build-asi-apex-v5-pages.mjs

      - name: Verify public artifact boundary
        shell: bash
        run: |
          set -euo pipefail
          test -f site/index.html
          test -f site/theatre.html
          test -f site/architecture.html
          test -f site/trust.html
          test -f site/pilot.html
          test -f site/dossier.html
          test -f site/production-manifest.json
          test -f site/assets/asi-apex-v5.css
          test -f site/assets/asi-apex-v5.js
          if find site -name '.env*' -o -name 'node_modules' -o -name '.git' -o -name '.next' | grep -q .; then
            echo 'Forbidden private/build artifact found in Pages site.'
            exit 1
          fi
          if grep -RInE '(PRIVATE_KEY|MNEMONIC|SEED_PHRASE|SERVICE_ROLE|STRIPE_SECRET|LIVE_SECRET|SUPABASE_SERVICE|BEGIN RSA PRIVATE KEY|BEGIN PRIVATE KEY|AKIA[0-9A-Z]{16})' site; then
            echo 'Secret-like marker found in Pages artifact.'
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy ASI Apex v5 to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
