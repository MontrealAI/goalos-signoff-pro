name: Deploy GoalOS Signoff Pro production site

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "config/**"
      - "schemas/**"
      - "docs/**"
      - "legal/**"
      - "examples/**"
      - "public/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build and verify public production site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Build ASI Apex public site
        run: node scripts/build-asi-apex-v6-pages.mjs
      - name: Build Sovereign Machine Economy pages
        run: node scripts/build-sovereign-machine-economy-pages.mjs
      - name: Build User Activation pages
        run: node scripts/build-user-activation-pages.mjs
      - name: Build legal zero-data pages and harden public site
        run: node scripts/build-legal-zero-data-pages.mjs
      - name: Verify Sovereign Machine Economy parity
        run: node scripts/verify-sovereign-machine-economy.mjs
      - name: Verify capability parity if present
        run: |
          if [ -f scripts/verify-capability-parity.mjs ]; then node scripts/verify-capability-parity.mjs; else echo "capability parity verifier not present"; fi
      - name: Verify website quality
        run: node scripts/verify-website-quality.mjs
      - name: Verify legal zero-data posture
        run: node scripts/verify-legal-zero-data-posture.mjs
      - name: Final public artifact safety scan
        shell: bash
        run: |
          set -euo pipefail
          test ! -e site/.env
          test ! -e site/.git
          test ! -d site/node_modules
          test ! -d site/.next
          ! grep -RInE "(PRIVATE KEY|SERVICE_ROLE|sk_live_|contact@montreal\.ai|google-analytics|googletagmanager|walletconnect)" site
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
