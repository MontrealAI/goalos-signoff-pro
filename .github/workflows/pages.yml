name: Deploy GoalOS Signoff Pro production site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'config/goalos-production-site.json'
      - 'scripts/build-goalos-production-site.mjs'
      - 'scripts/verify-goalos-production-site.mjs'
      - 'scripts/verify-website-quality.mjs'
      - 'scripts/generate-browser-beta-demo-bundle.mjs'
      - '.github/workflows/pages.yml'
      - '.github/workflows/website-quality.yml'
      - '.github/workflows/browser-beta-demo.yml'

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build and verify canonical production site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build canonical GoalOS production site
        run: node scripts/build-goalos-production-site.mjs
      - name: Verify canonical production site
        run: node scripts/verify-goalos-production-site.mjs
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
