name: Deploy GoalOS Signoff Pro production site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'config/**'
      - 'docs/**'
      - 'public/**'
      - 'src/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: goalos-pages-production
  cancel-in-progress: true

jobs:
  build:
    name: Build and verify public production site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build public site and extension labs
        shell: bash
        run: |
          set -euo pipefail
          rm -rf site
          if [ -f scripts/build-goalos-production-site.mjs ]; then
            node scripts/build-goalos-production-site.mjs
          else
            mkdir -p site
          fi
          if [ -d scripts ]; then
            while IFS= read -r script; do
              node "$script"
            done < <(find scripts -maxdepth 1 -type f -name 'build-*-lab-page.mjs' | sort)
          fi
          if [ -f scripts/finalize-public-site-boundaries.mjs ]; then
            node scripts/finalize-public-site-boundaries.mjs
          fi
          if [ -d scripts ]; then
            while IFS= read -r script; do
              node "$script"
            done < <(find scripts -maxdepth 1 -type f \( -name 'repair-*-legal-rails.mjs' -o -name 'repair-*-public-rule.mjs' \) | sort)
          fi
          if [ -f scripts/normalize-public-site-boundaries.mjs ]; then
            node scripts/normalize-public-site-boundaries.mjs
          fi
      - name: Verify production site
        shell: bash
        run: |
          set -euo pipefail
          if [ -f scripts/verify-goalos-production-site.mjs ]; then
            node scripts/verify-goalos-production-site.mjs
          fi
          if [ -d scripts ]; then
            while IFS= read -r script; do
              node "$script"
            done < <(find scripts -maxdepth 1 -type f -name 'verify-*-lab-page.mjs' | sort)
          fi
          if [ -f scripts/verify-public-demo-routes.mjs ]; then
            node scripts/verify-public-demo-routes.mjs
          fi
          if [ -f scripts/verify-website-quality.mjs ]; then
            node scripts/verify-website-quality.mjs
          fi
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
