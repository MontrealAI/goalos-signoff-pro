name: Deploy GoalOS Signoff Pro production site

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'config/**'
      - 'scripts/**'
      - '.github/workflows/pages.yml'
      - '.github/workflows/website-quality.yml'
      - '.github/workflows/proof-gradient-lab.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build and verify canonical production site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Build canonical production site
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f scripts/build-goalos-production-site.mjs ]; then
            echo "Missing scripts/build-goalos-production-site.mjs. Install the canonical production site package first." >&2
            exit 1
          fi
          node scripts/build-goalos-production-site.mjs
      - name: Add route-safe public demo pages
        shell: bash
        run: |
          set -euo pipefail
          for script in \
            scripts/build-proof-gradient-lab-page.mjs \
            scripts/build-capability-compounding-lab-page.mjs; do
            if [ -f "$script" ]; then
              echo "Running $script"
              node "$script"
            else
              echo "Skipping optional $script"
            fi
          done
      - name: Verify canonical production site
        run: node scripts/verify-goalos-production-site.mjs
      - name: Verify public demo routes
        shell: bash
        run: |
          set -euo pipefail
          if [ -f scripts/verify-proof-gradient-lab-page.mjs ]; then node scripts/verify-proof-gradient-lab-page.mjs; fi
          if [ -f scripts/verify-capability-compounding-lab-page.mjs ]; then node scripts/verify-capability-compounding-lab-page.mjs; fi
          node scripts/verify-public-demo-routes.mjs
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
