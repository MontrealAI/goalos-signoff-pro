name: Deploy GoalOS Signoff Pro production site

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "config/**"
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build and verify public production site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Build public website layers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site
          for script in \
            scripts/build-asi-apex-v6-pages.mjs \
            scripts/build-sovereign-machine-economy-pages.mjs \
            scripts/build-user-activation-pages.mjs \
            scripts/build-legal-zero-data-pages.mjs \
            scripts/build-agialpha-token-boundary-pages.mjs \
            scripts/build-user-delight-pages.mjs \
            scripts/build-holy-grail-browser-demo.mjs \
            scripts/build-multi-agent-coordination-demo.mjs \
            scripts/build-browser-beta-experience.mjs
          do
            if [ -f "$script" ]; then node "$script"; fi
          done
          if [ -f scripts/finalize-public-site-boundaries.mjs ]; then node scripts/finalize-public-site-boundaries.mjs; fi
          node scripts/finalize-browser-beta-production.mjs
      - name: Verify production quality gates
        shell: bash
        run: |
          set -euo pipefail
          for script in \
            scripts/verify-sovereign-machine-economy.mjs \
            scripts/verify-capability-parity.mjs \
            scripts/verify-website-quality.mjs \
            scripts/verify-legal-zero-data-posture.mjs \
            scripts/verify-agialpha-token-boundary.mjs \
            scripts/verify-public-artifact-safety.mjs \
            scripts/verify-user-delight-autopilot.mjs \
            scripts/verify-holy-grail-browser-demo.mjs \
            scripts/verify-multi-agent-coordination-demo.mjs
          do
            if [ -f "$script" ]; then node "$script"; fi
          done
          node scripts/verify-browser-beta-production.mjs
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
