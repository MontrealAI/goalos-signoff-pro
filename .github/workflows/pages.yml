name: Deploy GoalOS Signoff Pro production site

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build and verify canonical production site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build public site and extensions
        shell: bash
        run: |
          set -euo pipefail
          if [ -f scripts/build-goalos-production-site.mjs ]; then node scripts/build-goalos-production-site.mjs; else mkdir -p site; fi
          if [ -f scripts/build-proof-gradient-lab-page.mjs ]; then node scripts/build-proof-gradient-lab-page.mjs; fi
          if [ -f scripts/build-capability-compounding-lab-page.mjs ]; then node scripts/build-capability-compounding-lab-page.mjs; fi
          if [ -f scripts/build-sovereign-experience-lab-page.mjs ]; then node scripts/build-sovereign-experience-lab-page.mjs; fi
          if [ -f scripts/build-proof-settlement-lab-page.mjs ]; then node scripts/build-proof-settlement-lab-page.mjs; fi
          if [ -f scripts/build-public-private-proof-boundary-lab-page.mjs ]; then node scripts/build-public-private-proof-boundary-lab-page.mjs; fi
          if [ -f scripts/build-governed-decision-state-lab-page.mjs ]; then node scripts/build-governed-decision-state-lab-page.mjs; fi
          node scripts/build-rollback-challenge-lab-page.mjs
      - name: Verify public site
        shell: bash
        run: |
          set -euo pipefail
          if [ -f scripts/verify-goalos-production-site.mjs ]; then node scripts/verify-goalos-production-site.mjs; fi
          if [ -f scripts/verify-proof-gradient-lab-page.mjs ]; then node scripts/verify-proof-gradient-lab-page.mjs; fi
          if [ -f scripts/verify-capability-compounding-lab-page.mjs ]; then node scripts/verify-capability-compounding-lab-page.mjs; fi
          if [ -f scripts/verify-sovereign-experience-lab-page.mjs ]; then node scripts/verify-sovereign-experience-lab-page.mjs; fi
          if [ -f scripts/verify-proof-settlement-lab-page.mjs ]; then node scripts/verify-proof-settlement-lab-page.mjs; fi
          if [ -f scripts/verify-public-private-proof-boundary-lab-page.mjs ]; then node scripts/verify-public-private-proof-boundary-lab-page.mjs; fi
          if [ -f scripts/verify-governed-decision-state-lab-page.mjs ]; then node scripts/verify-governed-decision-state-lab-page.mjs; fi
          node scripts/verify-rollback-challenge-lab-page.mjs
          node scripts/verify-public-demo-routes.mjs
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
