name: Deploy sovereign apex production site

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/pages.yml'
      - 'scripts/build-sovereign-apex-pages.mjs'
      - 'README.md'
      - 'docs/**'
      - 'config/**'
      - 'schemas/**'
      - 'contracts/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sovereign-apex-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and verify sovereign apex site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build curated static website
        shell: bash
        run: node scripts/build-sovereign-apex-pages.mjs

      - name: Refuse private material in public Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          test -d site
          if find site -type d \( -name .git -o -name node_modules -o -name .next \) | grep -q .; then
            echo "Forbidden build/cache directory in Pages artifact." >&2
            exit 1
          fi
          if find site -type f \( -name '.env' -o -name '.env.*' -o -name '*private*key*' -o -name '*.pem' \) | grep -q .; then
            echo "Forbidden private-material filename in Pages artifact." >&2
            exit 1
          fi
          if grep -RInE 'BEGIN (RSA |EC |OPENSSH |)PRIVATE KEY|SUPABASE_SERVICE_ROLE|STRIPE_SECRET|sk_live_|ghp_[A-Za-z0-9_]+|MNEMONIC|SEED_PHRASE|PRIVATE_KEY' site; then
            echo "Secret-like material found in Pages artifact." >&2
            exit 1
          fi
          test -f site/index.html
          test -f site/production-manifest.json
          test -f site/assets/sovereign-apex.css
          test -f site/assets/sovereign-apex.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to https://montrealai.github.io/goalos-signoff-pro/
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy sovereign apex site to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
