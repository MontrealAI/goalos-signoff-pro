name: Deploy ASI Apex v6 final production site

on:
  push:
    branches: [main]
    paths:
      - scripts/build-asi-apex-v6-pages.mjs
      - .github/workflows/pages.yml
      - docs/**
      - README.md
      - package.json
      - .github/CODEOWNERS
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build, verify, and package ASI Apex v6 site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build final production static site
        shell: bash
        run: |
          set -euo pipefail
          node --version
          node scripts/build-asi-apex-v6-pages.mjs

      - name: Verify public Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          test -f site/index.html
          test -f site/platform.html
          test -f site/theatre.html
          test -f site/architecture.html
          test -f site/trust.html
          test -f site/pilot.html
          test -f site/dossier.html
          test -f site/production-manifest.json
          test -f site/assets/asi-apex-v6.css
          test -f site/assets/asi-apex-v6.js
          ! find site -name '.env*' -o -path '*/node_modules/*' -o -path '*/.git/*' -o -path '*/.next/*' | grep .
          ! grep -R -n -E 'BEGIN [A-Z ]*PRIVATE KEY|MNEMONIC|SEED_PHRASE|SERVICE_ROLE|SUPABASE_SERVICE|STRIPE_SECRET|sk_live_|WALLET_PRIVATE|AGIALPHA_TREASURY_KEY' site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy ASI Apex v6 to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
