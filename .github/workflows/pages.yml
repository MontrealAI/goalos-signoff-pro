name: Deploy GoalOS Signoff Pro production site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'config/**'
      - 'schemas/**'
      - 'docs/**'
      - 'examples/**'
      - '.github/workflows/pages.yml'
      - '.github/workflows/website-quality.yml'
      - '.github/workflows/sovereign-machine-economy.yml'

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build and verify public production site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Pages
        uses: actions/configure-pages@v5
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate Signoff Pro public site
        run: node scripts/build-asi-apex-v6-pages.mjs
      - name: Generate Sovereign Machine Economy pages
        run: node scripts/build-sovereign-machine-economy-pages.mjs
      - name: Generate User Activation Layer
        run: node scripts/build-user-activation-pages.mjs
      - name: Verify implementation and public posture
        run: |
          node scripts/verify-sovereign-machine-economy.mjs
          if [ -f scripts/verify-capability-parity.mjs ]; then node scripts/verify-capability-parity.mjs; fi
          node scripts/verify-website-quality.mjs
      - name: Refuse secrets in Pages artifact
        run: |
          set -euo pipefail
          ! find site -name '.env*' -o -name 'node_modules' -o -name '.git' -o -name '.next' | grep .
          ! grep -RIE --line-number 'BEGIN (RSA|EC|OPENSSH|PRIVATE) KEY|sk_live_|service_role|SUPABASE_SERVICE_ROLE|MNEMONIC|seed phrase|PRIVATE_KEY=' site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
