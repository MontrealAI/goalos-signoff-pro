name: Institutional excellence

on:
  pull_request:
  workflow_dispatch:

jobs:
  public-safe-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify institutional docs, routes, and public-safe boundaries
        run: npm run institutional:verify
      - name: Verify public labs v22-v27
        run: node scripts/verify-goalos-signoff-public-labs-v22-v27.mjs
