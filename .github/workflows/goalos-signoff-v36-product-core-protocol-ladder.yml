name: GoalOS Signoff Pro — Product Core and Protocol Ladder v36

on:
  workflow_dispatch:
    inputs:
      commit_generated_site:
        description: Commit generated site files back to this branch
        type: boolean
        default: true
      deploy_pages:
        description: Deploy GitHub Pages after verification
        type: boolean
        default: true
  push:
    branches: [main]
    paths:
      - 'scripts/build-goalos-signoff-product-protocol-ladder-v36.mjs'
      - 'scripts/verify-goalos-signoff-product-protocol-ladder-v36.mjs'
      - 'scripts/build-goalos-signoff-public-labs-v22-v36.mjs'
      - 'scripts/verify-goalos-signoff-public-labs-v22-v36.mjs'
      - '.github/workflows/goalos-signoff-v36-product-core-protocol-ladder.yml'
      - 'config/goalos-signoff-product-protocol-ladder-v36.json'
      - 'docs/**'
      - 'site/**'

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GOALOS_PUBLIC_SAFE: 'true'
  GOALOS_ZERO_VALUE_MOVED: 'true'
  GOALOS_NO_EXTERNAL_AI_CALLS: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build complete v22-v36 public suite
        run: node scripts/build-goalos-signoff-public-labs-v22-v36.mjs
      - name: Verify v36 product and protocol ladder
        run: node scripts/verify-goalos-signoff-product-protocol-ladder-v36.mjs
      - name: Verify complete v22-v36 public suite
        run: node scripts/verify-goalos-signoff-public-labs-v22-v36.mjs
      - name: Commit generated site files
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_generated_site }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site docs/generated-source/v36 config scripts verification .github/workflows docs GOALOS_PUBLIC_LAB_V36_START_HERE.md GITHUB_WEB_UI_INSTALL_V36_SIGNOFF_PRODUCT_LADDER.txt
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Add GoalOS Signoff Product Core and Protocol Ladder v36"
            git push
          fi
      - name: Upload Pages artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_pages }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
