name: GoalOS Signoff Pro — AGIALPHA 48-Contract Atlas v38 Repair

on:
  workflow_dispatch:
    inputs:
      commit_generated_site:
        description: Commit generated site files back to the branch
        type: boolean
        default: true
      deploy_pages:
        description: Deploy GitHub Pages after verification
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GOALOS_PUBLIC_SAFE: "true"
  GOALOS_ZERO_VALUE_MOVED: "true"
  GOALOS_NO_EXTERNAL_AI_CALLS: "true"

jobs:
  build:
    name: Build and verify v38 contract atlas repair
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Preflight v38 repair files
        run: node scripts/verify-goalos-v38-repair-preflight.mjs
      - name: Build v22-v38 public suite
        run: node scripts/build-goalos-signoff-public-labs-v22-v38.mjs
      - name: Verify v38 contract atlas and public-safe site
        run: node scripts/verify-goalos-signoff-public-labs-v22-v38.mjs
      - name: Commit generated site files
        if: ${{ inputs.commit_generated_site }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site scripts config docs .github/workflows
          git commit -m "Add GoalOS AGIALPHA 48-contract atlas v38" || echo "No changes to commit"
          git push || true
      - name: Upload site preview artifact
        uses: actions/upload-artifact@v6
        with:
          name: goalos-signoff-pro-v38-site
          path: site
      - name: Upload Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
  deploy:
    if: ${{ inputs.deploy_pages }}
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
