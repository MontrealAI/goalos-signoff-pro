name: GoalOS Signoff Pro — Executive AI Proof Console v31

on:
  workflow_dispatch:
    inputs:
      commit_generated_site:
        description: Commit generated site/pages/artifacts back to this branch
        required: true
        default: 'true'
        type: choice
        options: ['true','false']
      deploy_pages:
        description: Deploy generated site to GitHub Pages
        required: true
        default: 'true'
        type: choice
        options: ['true','false']

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: goalos-signoff-v31-experience-console
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build v22-v31 public experience suite
        run: |
          set -euo pipefail
          node scripts/build-goalos-signoff-pro-institutional-v22-v31.mjs
      - name: Verify v31 guided experience and public safety
        run: |
          set -euo pipefail
          node scripts/verify-executive-ai-proof-console-v31.mjs
          if [ -f scripts/verify-goalos-signoff-public-labs-v22-v30.mjs ]; then node scripts/verify-goalos-signoff-public-labs-v22-v30.mjs; fi
          if [ -f scripts/verify-goalos-production-site.mjs ]; then node scripts/verify-goalos-production-site.mjs; fi
          if [ -f scripts/verify-public-artifact-safety.mjs ]; then node scripts/verify-public-artifact-safety.mjs; fi
      - name: Upload generated site preview
        uses: actions/upload-artifact@v4
        with:
          name: goalos-signoff-pro-v31-generated-site
          path: site
      - name: Commit generated v31 site
        if: ${{ inputs.commit_generated_site == 'true' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site scripts config docs verification .github/workflows/goalos-signoff-experience-console-v31.yml
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Add GoalOS Executive AI Proof Console v31"
            git push
          fi
      - name: Configure GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    if: ${{ inputs.deploy_pages == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
