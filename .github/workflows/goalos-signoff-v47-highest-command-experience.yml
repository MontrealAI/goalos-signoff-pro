name: GoalOS Signoff Pro — Highest Command Experience v47

on:
  workflow_dispatch:
    inputs:
      commit_generated_site:
        description: Commit generated site files back to the branch
        required: true
        default: 'true'
        type: choice
        options: ['true','false']
      deploy_pages:
        description: Deploy to GitHub Pages
        required: true
        default: 'true'
        type: choice
        options: ['true','false']
      deploy_timeout_ms:
        description: Pages deployment timeout in milliseconds
        required: true
        default: '3600000'

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GOALOS_PUBLIC_SAFE: 'true'
  GOALOS_ZERO_VALUE_MOVED: 'true'
  GOALOS_NO_EXTERNAL_AI_CALLS: 'true'

concurrency:
  group: goalos-pages-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify v47 highest command experience
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Build v47 command experience
        run: node scripts/build-goalos-highest-command-center-v47.mjs
      - name: Repair command safety and legal rails
        run: node scripts/repair-goalos-command-safety-v47.mjs
      - name: Verify v47 command experience
        run: node scripts/verify-goalos-highest-command-center-v47.mjs
      - name: Optional production site gate
        run: |
          if [ -f scripts/verify-goalos-production-site.mjs ]; then node scripts/verify-goalos-production-site.mjs; else echo "No production gate present"; fi
      - name: Optional public-safe artifact gate
        run: |
          if [ -f scripts/verify-goalos-public-safe.mjs ]; then node scripts/verify-goalos-public-safe.mjs; else echo "No public-safe gate present"; fi
      - name: Commit generated site files
        if: ${{ github.event.inputs.commit_generated_site == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site scripts config docs serverless verification .github/workflows || true
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Add GoalOS v47 highest command experience [skip ci]"
            git push
          fi
      - name: Configure GitHub Pages
        if: ${{ github.event.inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v5
      - name: Prepare Pages artifact
        if: ${{ github.event.inputs.deploy_pages == 'true' }}
        run: |
          touch site/.nojekyll
          find site -maxdepth 2 -type f | sort | head -50
      - name: Upload Pages artifact
        if: ${{ github.event.inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
  deploy:
    name: Deploy GitHub Pages
    if: ${{ github.event.inputs.deploy_pages == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages with extended timeout
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: ${{ github.event.inputs.deploy_timeout_ms }}
