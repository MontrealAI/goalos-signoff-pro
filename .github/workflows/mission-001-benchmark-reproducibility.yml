name: Mission 001 Benchmark Reproducibility Packet

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  packet:
    name: Generate Mission 001 reproducibility packet
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Generate packet
        run: node scripts/generate-mission-001-benchmark-packet.mjs
      - name: Upload packet artifact
        uses: actions/upload-artifact@v7
        with:
          name: goalos-mission-001-benchmark-reproducibility-packet
          path: artifacts/mission-001-benchmark-reproducibility-packet
