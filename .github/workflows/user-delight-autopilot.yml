name: User Delight Demo Autopilot

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Choose a public-safe demo scenario
        required: true
        type: choice
        default: ai-research-report
        options:
          - ai-research-report
          - automation-delivery
          - grant-milestone
          - vendor-review

permissions:
  contents: read

jobs:
  demo:
    name: Generate downloadable demo Proof Mission
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate demo artifact bundle
        env:
          GOALOS_DEMO_SCENARIO: ${{ inputs.scenario }}
        run: node scripts/generate-user-delight-demo.mjs
      - name: Upload demo bundle
        uses: actions/upload-artifact@v4
        with:
          name: goalos-demo-proof-mission-${{ inputs.scenario }}
          path: artifacts/user-delight-demo
