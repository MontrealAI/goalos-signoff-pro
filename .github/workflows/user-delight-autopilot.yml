name: User Delight Demo Autopilot

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Demo scenario
        required: true
        default: ai-research-report
        type: choice
        options:
          - ai-research-report
          - automation-delivery
          - grant-milestone
          - vendor-review

permissions:
  contents: read

jobs:
  demo:
    name: Generate public-safe Proof Mission demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Generate demo artifact bundle
        run: |
          set -euo pipefail
          node scripts/generate-user-delight-demo.mjs --scenario "${{ inputs.scenario }}"
      - uses: actions/upload-artifact@v7
        with:
          name: goalos-proof-mission-demo-${{ inputs.scenario }}
          path: artifacts/user-delight-demo
