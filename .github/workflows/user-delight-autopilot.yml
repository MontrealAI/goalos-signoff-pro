name: User Delight Demo Autopilot

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Choose a public-safe demo Proof Mission"
        required: true
        default: "ai-research-report"
        type: choice
        options:
          - ai-research-report
          - automation-delivery
          - grant-milestone
          - vendor-review

permissions:
  contents: read

jobs:
  generate-demo:
    name: Generate public-safe demo Proof Mission
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate demo Proof Mission artifacts
        env:
          SCENARIO: ${{ inputs.scenario }}
        run: |
          set -euo pipefail
          node scripts/generate-user-delight-demo.mjs --scenario=${SCENARIO}

      - name: Upload demo Proof Mission bundle
        uses: actions/upload-artifact@v4
        with:
          name: goalos-demo-proof-mission-${{ inputs.scenario }}
          path: artifacts/user-delight-demo/${{ inputs.scenario }}
          if-no-files-found: error
