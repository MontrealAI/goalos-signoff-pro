name: Bug report
description: Something is not working as expected.
title: "Bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact clicks or actions.
      placeholder: "1. Open...\n2. Click...\n3. See..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Create brief
        - Evidence upload
        - Change request
        - Review decision
        - Mission Receipt
        - Verification
        - Billing / invoice
        - Optional blockchain anchor
        - Other
    validations:
      required: true
  - type: textarea
    id: sensitive
    attributes:
      label: Sensitive data check
      description: Do not paste secrets, private keys, user files, or private evidence.
      value: "I confirm this issue does not include secrets or private customer data."
    validations:
      required: true
